<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer Trip '26</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:        #f2d9a2;
      --sand-light:  #faecd0;
      --ocean:       #2a7d8c;
      --ocean-dark:  #1d5c68;
      --terracotta:  #c95f38;
      --navy:        #2b3a4a;
      --cloud:       #fdf6e8;
      --ink:         #1e2d38;
      --mist:        #e8d9b8;
      --drive-color: #2a7d8c;
      --fly-color:   #c95f38;
    }

    html, body { height: 100%; font-family: 'Jost', sans-serif; background: var(--sand-light); color: var(--ink); }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--navy);
      color: var(--cloud);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(42,125,140,0.2) 0%, transparent 60%);
    }

    .trip-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sand);
      margin-bottom: 8px;
    }

    .trip-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      line-height: 1.05;
      color: var(--cloud);
    }

    .trip-title em { font-style: italic; color: var(--sand); }

    .trip-meta {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 300;
      color: rgba(253,246,232,0.4);
      letter-spacing: 0.04em;
    }

    /* legend row in header */
    .route-legend {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(253,246,232,0.55);
    }

    .legend-line {
      width: 24px;
      height: 2px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .legend-line.drive {
      background: var(--drive-color);
    }

    .legend-line.fly {
      background: none;
      border-top: 2px dashed var(--fly-color);
      height: 0;
      margin-top: 1px;
    }

    .stops-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 24px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .leg-label {
      padding: 16px 28px 5px;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(253,246,232,0.25);
    }

    .stop {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 11px 28px;
      cursor: pointer;
      transition: background 0.18s;
      border-left: 2px solid transparent;
    }

    .stop:hover { background: rgba(255,255,255,0.04); }

    .stop.active {
      background: rgba(42,125,140,0.18);
      border-left-color: var(--ocean);
    }

    .stop-number {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 500;
      margin-top: 1px;
      transition: background 0.18s, color 0.18s;
    }

    .stop.type-hotel  .stop-number { background: rgba(201,95,56,0.28);  color: #e8855e; }
    .stop.type-villa  .stop-number { background: rgba(42,125,140,0.28); color: #5ab8ca; }
    .stop.type-airbnb .stop-number { background: rgba(242,217,162,0.2); color: var(--sand); }
    .stop.type-flight .stop-number { background: rgba(255,255,255,0.08); color: rgba(253,246,232,0.38); }
    .stop.active .stop-number { background: var(--ocean) !important; color: white !important; }

    .stop-info { flex: 1; min-width: 0; }

    .stop-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.2;
      color: var(--cloud);
      margin-bottom: 2px;
    }

    .stop-date {
      font-size: 10.5px;
      font-weight: 300;
      color: rgba(253,246,232,0.36);
    }

    .stop-address {
      font-size: 10px;
      font-weight: 300;
      color: rgba(253,246,232,0.25);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .connector {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 28px 0 50px;
      height: 18px;
    }

    .connector-line {
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.07);
    }

    .connector-tag {
      font-size: 8.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 2px;
      font-weight: 500;
    }

    .connector-tag.drive { color: var(--drive-color); background: rgba(42,125,140,0.15); }
    .connector-tag.fly   { color: var(--fly-color);   background: rgba(201,95,56,0.15); }

    /* ── MAP ── */
    .map-panel { position: relative; flex: 1; }

    #map { width: 100%; height: 100%; }

    /* custom popup */
    .leaflet-popup-content-wrapper {
      background: var(--cloud);
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(30,45,56,0.18);
      border-top: 3px solid var(--ocean);
      padding: 0;
    }

    .leaflet-popup-content { margin: 0; }
    .leaflet-popup-tip { background: var(--cloud); }
    .leaflet-popup-close-button { color: #aaa !important; top: 6px !important; right: 8px !important; }

    .popup-inner {
      padding: 12px 16px 14px;
      min-width: 200px;
    }

    .popup-eyebrow {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ocean);
      margin-bottom: 4px;
    }

    .popup-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 3px;
    }

    .popup-date {
      font-size: 10.5px;
      color: #8a7a60;
    }

    .popup-address {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
    }

    /* marker styles */
    .custom-marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      border: 2.5px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform 0.15s;
      color: white;
    }

    .custom-marker:hover { transform: scale(1.15); }
    .custom-marker.hotel  { background: var(--terracotta); }
    .custom-marker.villa  { background: var(--ocean); }
    .custom-marker.airbnb { background: #c8a055; }
    .custom-marker.flight { background: var(--navy); font-size: 13px; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: 100dvh; }
      .sidebar { max-height: 44vh; }
    }
  </style>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="trip-eyebrow">Family Trip · Jul 15 – 25, 2026</div>
      <h1 class="trip-title">Summer<br><em>Trip '26</em></h1>
      <p class="trip-meta">Vienna · Bad Kleinkirchheim · Puglia · Rome</p>
      <div class="route-legend">
        <div class="legend-item">
          <div class="legend-line drive"></div>
          Driving
        </div>
        <div class="legend-item">
          <div class="legend-line fly"></div>
          Flying
        </div>
      </div>
    </div>
    <div class="stops-list" id="stopsList"></div>
  </aside>

  <main class="map-panel">
    <div id="map"></div>
  </main>

</div>

<script>
  // ── DATA ──────────────────────────────────────────────────────────────────
  const stops = [
    { num:1, name:'Vienna Int\'l Airport (VIE)', type:'flight', date:'Jul 15', address:'1300 Schwechat, Austria',                   lat:48.1103, lng:16.5697, icon:'✈' },
    { num:2, name:'Hilton Vienna Park',           type:'hotel',  date:'Jul 15–16', address:'Am Stadtpark 1, 1030 Wien, Austria',    lat:48.2062, lng:16.3829 },
    { num:3, name:'Hotel Pulverer',               type:'hotel',  date:'Jul 16–19', address:'Thermenstraße 4, 9546 Bad Kleinkirchheim', lat:46.8137, lng:13.7800 },
    { num:4, name:'Vienna Int\'l Airport (VIE)', type:'flight', date:'Jul 19', address:'1300 Schwechat, Austria',                   lat:48.1103, lng:16.5697, icon:'✈', hideNum:true },
    { num:5, name:'Bari Airport (BRI)',           type:'flight', date:'Jul 19', address:'Viale Enzo Ferrari, 70128 Bari, Italy',    lat:41.1390, lng:16.7606, icon:'✈' },
    { num:6, name:'Casina Menga Villa',           type:'villa',  date:'Jul 19–23', address:'Contrada Bellocchio, 70043 Monopoli',   lat:40.9510, lng:17.3150 },
    { num:7, name:'Residenza Farina',             type:'airbnb', date:'Jul 23–25', address:'Via del Monte della Farina 36, 00186 Roma', lat:41.8946, lng:12.4749 },
    { num:8, name:'Fiumicino Airport (FCO)',      type:'flight', date:'Jul 25', address:'Via Pierpaolo Racchetti 1, 00054 Fiumicino', lat:41.8003, lng:12.2388, icon:'✈' },
  ];

  // segments: [fromIdx, toIdx, 'drive'|'fly']
  const segments = [
    [0, 1, 'drive'],   // VIE airport → Hilton Vienna
    [1, 2, 'drive'],   // Hilton Vienna → Hotel Pulverer
    [2, 3, 'drive'],   // Hotel Pulverer → VIE airport (return)
    [3, 4, 'fly'],     // VIE → BRI (flight)
    [4, 5, 'drive'],   // BRI → Casina Menga
    [5, 6, 'drive'],   // Casina Menga → Residenza Farina
    [6, 7, 'drive'],   // Residenza Farina → FCO
  ];

  const legs = [
    {
      label: 'Austria',
      stops: [0,1,2],
      connectors: [
        { tag: 'Drive', type: 'drive' },
        { tag: 'Drive', type: 'drive' },
      ]
    },
    {
      label: 'Italy',
      stops: [4,5,6,7],
      connectors: [
        { tag: 'Drive', type: 'drive' },
        { tag: 'Drive', type: 'drive' },
        { tag: 'Drive', type: 'drive' },
      ]
    }
  ];

  // ── MAP INIT ──────────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([46.5, 14.5], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // ── DRAW SEGMENTS ─────────────────────────────────────────────────────────
  const driveStyle = { color: '#2a7d8c', weight: 3, opacity: 0.85, lineJoin: 'round' };
  const flyStyle   = { color: '#c95f38', weight: 2.5, opacity: 0.8, dashArray: '8, 7' };

  function greatCirclePoints(lat1, lng1, lat2, lng2, n) {
    // generate intermediate points along a great circle arc for curved flight paths
    const toRad = d => d * Math.PI / 180;
    const toDeg = r => r * 180 / Math.PI;
    const φ1 = toRad(lat1), λ1 = toRad(lng1);
    const φ2 = toRad(lat2), λ2 = toRad(lng2);
    const d = 2 * Math.asin(Math.sqrt(
      Math.pow(Math.sin((φ2-φ1)/2), 2) +
      Math.cos(φ1) * Math.cos(φ2) * Math.pow(Math.sin((λ2-λ1)/2), 2)
    ));
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const f = i / n;
      const A = Math.sin((1-f)*d) / Math.sin(d);
      const B = Math.sin(f*d) / Math.sin(d);
      const x = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
      const y = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
      const z = A*Math.sin(φ1)               + B*Math.sin(φ2);
      pts.push([toDeg(Math.atan2(z, Math.sqrt(x*x+y*y))), toDeg(Math.atan2(y,x))]);
    }
    return pts;
  }

  segments.forEach(([fi, ti, mode]) => {
    const from = stops[fi], to = stops[ti];
    if (mode === 'drive') {
      L.polyline([[from.lat, from.lng],[to.lat, to.lng]], driveStyle).addTo(map);
    } else {
      const pts = greatCirclePoints(from.lat, from.lng, to.lat, to.lng, 60);
      L.polyline(pts, flyStyle).addTo(map);

      // plane icon midpoint
      const mid = pts[Math.floor(pts.length / 2)];
      const planeIcon = L.divIcon({
        className: '',
        html: `<div style="font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));transform:rotate(-30deg);">✈</div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });
      L.marker(mid, { icon: planeIcon, interactive: false }).addTo(map);
    }
  });

  // ── MARKERS ───────────────────────────────────────────────────────────────
  const typeLabels = { hotel:'Hotel', villa:'Villa', airbnb:'Airbnb', flight:'Airport' };
  const markerMap = {};

  // Deduplicate VIE (shows twice — arrival & departure)
  const renderedCoords = {};

  stops.forEach((stop, i) => {
    const key = `${stop.lat},${stop.lng}`;
    // For VIE which appears twice, skip the second pin but still register
    if (renderedCoords[key]) {
      markerMap[i] = markerMap[renderedCoords[key]];
      return;
    }
    renderedCoords[key] = i;

    const displayNum = stop.icon || stop.num;
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${stop.type}">${displayNum}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -18]
    });

    const popup = L.popup({ closeButton: true, maxWidth: 260 }).setContent(`
      <div class="popup-inner">
        <div class="popup-eyebrow">${typeLabels[stop.type] || ''}</div>
        <div class="popup-name">${stop.name}</div>
        <div class="popup-date">${stop.date}</div>
        <div class="popup-address">${stop.address}</div>
      </div>
    `);

    const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map).bindPopup(popup);
    markerMap[i] = marker;
  });

  // ── FIT BOUNDS ────────────────────────────────────────────────────────────
  const allLatLngs = stops.map(s => [s.lat, s.lng]);
  map.fitBounds(L.latLngBounds(allLatLngs).pad(0.12));

  // ── SIDEBAR ───────────────────────────────────────────────────────────────
  function buildSidebar() {
    const list = document.getElementById('stopsList');

    // Austria leg
    const austriaStops = [0,1,2];
    const austriaConns = ['drive','drive'];
    renderLeg(list, 'Austria', austriaStops, austriaConns);

    // Flight connector
    const transDiv = document.createElement('div');
    transDiv.style.cssText = 'padding:10px 28px 10px 50px;display:flex;align-items:center;gap:10px;';
    transDiv.innerHTML = `
      <div style="width:1px;height:100%;background:rgba(255,255,255,0.06)"></div>
      <span class="connector-tag fly">✈ VIE → BRI · Ryanair FR9066 · Jul 19</span>`;
    list.appendChild(transDiv);

    // Italy leg
    const italyStops = [4,5,6,7];
    const italyConns = ['drive','drive','drive'];
    renderLeg(list, 'Italy', italyStops, italyConns);
  }

  function renderLeg(container, label, stopIdxs, connTypes) {
    const legEl = document.createElement('div');

    const lbl = document.createElement('div');
    lbl.className = 'leg-label';
    lbl.textContent = label;
    legEl.appendChild(lbl);

    stopIdxs.forEach((si, ii) => {
      const stop = stops[si];

      const stopEl = document.createElement('div');
      stopEl.className = `stop type-${stop.type}`;
      stopEl.id = `sidebar-stop-${si}`;
      stopEl.innerHTML = `
        <div class="stop-number">${stop.icon || stop.num}</div>
        <div class="stop-info">
          <div class="stop-name">${stop.name}</div>
          <div class="stop-date">${stop.date}</div>
          <div class="stop-address">${stop.address}</div>
        </div>`;

      stopEl.addEventListener('click', () => {
        document.querySelectorAll('.stop').forEach(e => e.classList.remove('active'));
        stopEl.classList.add('active');
        const marker = markerMap[si];
        if (marker) {
          map.setView(marker.getLatLng(), 13, { animate: true });
          marker.openPopup();
        }
      });

      legEl.appendChild(stopEl);

      if (ii < connTypes.length) {
        const conn = document.createElement('div');
        conn.className = 'connector';
        conn.innerHTML = `
          <div class="connector-line"></div>
          <span class="connector-tag ${connTypes[ii]}">${connTypes[ii] === 'drive' ? '🚗 Drive' : '✈ Fly'}</span>`;
        legEl.appendChild(conn);
      }
    });

    container.appendChild(legEl);
  }

  buildSidebar();
</script>

</body>
</html>
